<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Watch the Saras demo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.10" fill="none" stroke="#ffffff" stroke-width="1">
    <circle cx="1050" cy="120" r="180"/>
    <circle cx="1050" cy="120" r="120"/>
    <circle cx="1050" cy="120" r="60"/>
    <circle cx="140" cy="520" r="160"/>
    <circle cx="140" cy="520" r="100"/>
  </g>

  <g transform="translate(80,100)">
    <text x="0" y="0" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto" font-size="22" font-weight="500" letter-spacing="4">SARAS · ON WINGMAN</text>
  </g>

  <g transform="translate(80,200)">
    <text fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto" font-size="76" font-weight="800">
      <tspan x="0" y="0">Your private AI</tspan>
      <tspan x="0" y="90">language coach</tspan>
    </text>
    <text x="0" y="180" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto" font-size="28" font-weight="400">
      Voice in → word-level scoring → native-voice reply
    </text>
  </g>

  <g transform="translate(600,430)">
    <circle cx="0" cy="0" r="64" fill="url(#playGrad)" filter="url(#glow)"/>
    <polygon points="-18,-26 -18,26 26,0" fill="#ffffff"/>
  </g>

  <text x="600" y="560" fill="#f1f5f9" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto" font-size="24" font-weight="600" text-anchor="middle">▶ Watch the 2-minute demo on Loom</text>

  <g transform="translate(1050,555)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto">
    <rect x="-95" y="-22" width="190" height="44" rx="22" fill="#ffffff" opacity="0.08"/>
    <text x="0" y="6" fill="#e2e8f0" font-size="18" font-weight="600" text-anchor="middle">#Wingathon · 🪷</text>
  </g>
</svg>
